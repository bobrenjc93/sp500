name: Update S&P 500 Data

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Rebuild scope
        type: choice
        options:
          - daily
          - full
        default: daily
  schedule:
    - cron: "30 23 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build datasets
        run: python scripts/update_data.py --mode "${{ github.event.inputs.mode || 'daily' }}"

      - name: Commit generated updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all data README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Refresh S&P 500 datasets"
          git push
